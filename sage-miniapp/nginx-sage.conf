# Добавить в /etc/nginx/sites-available/default или в блок server dnd-bot.ru
# Проксирует /sage/ → Flask API на 127.0.0.1:5001

location /sage/ {
    proxy_pass         http://127.0.0.1:5001/;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_read_timeout 310s;   # чуть больше таймаута Flask (300s)

    # CORS для VK Mini App
    add_header Access-Control-Allow-Origin  "https://vk.com" always;
    add_header Access-Control-Allow-Origin  "https://*.vk-apps.com" always;
    add_header Access-Control-Allow-Headers "Content-Type, X-VK-User-Id" always;
    add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;

    if ($request_method = OPTIONS) {
        return 204;
    }
}
